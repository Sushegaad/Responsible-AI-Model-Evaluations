name: Weekly RAI Evaluation

on:
  schedule:
    - cron: '0 22 * * 5'   # Every Friday 22:00 UTC = 6 PM EDT (UTC-4, Mar–Nov) / 5 PM EST (UTC-5, Nov–Mar)
  workflow_dispatch:
    inputs:
      models:
        description: 'Comma-separated model IDs (blank = all)'
        required: false
        default: ''
      num_samples:
        description: 'Samples per model'
        required: false
        default: '500'
      full_audit_chain:
        description: 'Full chain-of-reasoning scope: off | critical | failures | all'
        required: false
        default: 'failures'

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  evaluate:
    name: Run RedBench Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }

      - run: pip install -r requirements.txt

      - name: Run test suite
        run: |
          PYTHONPATH=source:. pytest test/ -v --tb=short
        continue-on-error: false   # fail the workflow if tests break

      - name: Check API keys present
        run: |
          [ -n "$ANTHROPIC_API_KEY" ] && echo "✅ Anthropic key set" || echo "⚠️  Anthropic missing (REQUIRED for neural judge)"
          [ -n "$OPENAI_API_KEY"    ] && echo "✅ OpenAI key set"    || echo "⚠️  OpenAI missing"
          [ -n "$GOOGLE_API_KEY"    ] && echo "✅ Google key set"    || echo "⚠️  Google missing"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}

      - name: Check API credits
        # Makes a minimal probe call (max_tokens=1) to each configured provider.
        # Fails immediately if any provider returns a billing, credit-exhaustion,
        # or hard rate-limit error — avoids burning hundreds of API calls only to
        # hit a quota wall mid-run.
        run: PYTHONPATH=source python source/scripts/check_api_credits.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}

      - name: Run evaluation pipeline
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.models }}" ]; then
            MODELS=$(echo "${{ github.event.inputs.models }}" | tr ',' ' ')
            ARGS="--models $MODELS"
          fi
          PYTHONPATH=source python -m eval.pipeline \
            --samples "${{ github.event.inputs.num_samples || '500' }}" \
            $ARGS
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:           ${{ secrets.GOOGLE_API_KEY }}
          # "failures" = full structured chain for every FAIL + CRITICAL_FAIL (recommended default)
          # Override via workflow_dispatch input for ad-hoc runs.
          REDEVAL_FULL_AUDIT_CHAIN: ${{ github.event.inputs.full_audit_chain || 'failures' }}

      - name: Build dashboard data
        run: PYTHONPATH=source python source/scripts/build_dashboard_data.py

      - name: Commit results
        run: |
          git config user.email "rai-eval-bot@users.noreply.github.com"
          git config user.name  "RAI Eval Bot"
          # Commit only metrics (not multi-MB raw/scored JSONL files)
          # -f needed for dashboard/data/results.json in case of any gitignore edge-cases
          git add data/weekly/*/metrics.json
          git add -f dashboard/data/results.json
          WEEK=$(python -c "from datetime import datetime; d=datetime.utcnow(); y,w,_=d.isocalendar(); print(f'{y}-W{w:02d}')")
          git commit -m "📊 Weekly eval: $WEEK" || echo "Nothing to commit"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-${{ github.run_id }}
          path: data/weekly/
          retention-days: 90

  deploy:
    name: Deploy to GitHub Pages
    needs: evaluate
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0 }
      - run: git pull origin main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: dashboard/ }
      - uses: actions/deploy-pages@v4
        id: deployment
